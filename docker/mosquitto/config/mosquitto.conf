# Listener on standard MQTT port
listener 1883

# WebSocket listener (optional - comment out if not needed)
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type all

# Allow anonymous access (change to false and add password file for production)
allow_anonymous true

# --- Uncomment below to require authentication ---
# allow_anonymous false
# password_file /mosquitto/config/passwd
