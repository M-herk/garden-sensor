[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false

###############################################################################
# INPUT - MQTT Consumer
###############################################################################
[[inputs.mqtt_consumer]]
  ## Mosquitto broker - reachable via shared Docker network
  servers = ["tcp://mosquitto:1883"]

  ## Topics to subscribe to
  topics = [
    "sensors/#"
  ]

  ## MQTT client ID
  client_id = "telegraf"

  ## Data format
  data_format = "json"

  ## Promote device_id from payload field to a tag
  tag_keys = ["device_id"]

  ## Drop the redundant timestamp field from the ESP32 JSON payload
  fielddrop = ["timestamp"]

###############################################################################
# OUTPUT - InfluxDB 1.x
###############################################################################
[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "sensors"
  username = "telegraf"
  password = "telegraf"
  retention_policy = ""
  timeout = "5s"


